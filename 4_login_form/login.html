<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Login Form</title> <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            border: none;
            border-radius: 20px;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .form-control {
            border-radius: 10px;
            padding: 12px;
        }

        .btn-login {
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
        }

        .logo {
            font-size: 3rem;
            color: #6f42c1;
        }
    </style>
</head>

<body>
    <div class="card shadow-lg login-card">
        <div class="card-body p-5">
            <div class="text-center mb-4"> <i class="bi bi-person-circle logo"></i>
                <h2 class="fw-bold mt-2">Welcome Back</h2>
                <p class="text-muted">Sign in to your account</p>
            </div>
            <form> <!-- Email -->
                <div class="mb-3"> <label class="form-label">Email Address</label>
                    <div class="input-group"> <span class="input-group-text"> <i class="bi bi-envelope"></i> </span>
                        <input type="email" class="form-control" placeholder="Enter your email" required> </div>
                </div> <!-- Password -->
                <div class="mb-3"> <label class="form-label">Password</label>
                    <div class="input-group"> <span class="input-group-text"> <i class="bi bi-lock"></i> </span> <input
                            type="password" class="form-control" placeholder="Enter your password" required> </div>
                </div> <!-- Remember Me -->
                <div class="d-flex justify-content-between mb-4">
                    <div class="form-check"> <input class="form-check-input" type="checkbox" id="remember"> <label
                            class="form-check-label" for="remember"> Remember Me </label> </div> <a href="#"
                        class="text-decoration-none"> Forgot Password? </a>
                </div> <!-- Login Button --> <button type="submit" class="btn btn-primary w-100 btn-login"> Login
                </button> <!-- Divider -->
                <div class="text-center my-4 text-muted"> OR </div> <!-- Social Login -->
                <div class="d-grid gap-2"> <button type="button" class="btn btn-outline-danger"> <i
                            class="bi bi-google"></i> Continue with Google </button> <button type="button"
                        class="btn btn-outline-dark"> <i class="bi bi-github"></i> Continue with GitHub </button> </div>
                <p class="text-center mt-4 mb-0"> Don't have an account? <a href="#"
                        class="text-decoration-none fw-bold"> Register </a> </p>
            </form>
        </div>
    </div> <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
